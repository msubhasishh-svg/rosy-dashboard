<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ROSY Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>🌌 ROSY DASHBOARD</h1>
</header>

<main class="dashboard">

    <section class="card ticker">
        <h2>📊 Live Ticker Tape</h2>
        <div id="ticker-widget"></div>
    </section>

    <section class="card chart">
        <h2>📈 TradingView Chart</h2>
        <div id="chart-widget"></div>
    </section>

    <section class="card watchlist">
        <h2>⭐ Watchlist</h2>
        <div id="watchlist-widget"></div>
    </section>

    <section class="card overview">
        <h2>🌍 Market Overview</h2>
        <div id="overview-widget"></div>
    </section>

    <section class="card news">
        <h2>📰 News</h2>
        <div id="news-widget"></div>
    </section>

    <section class="card calendar">
        <h2>📅 Economic Calendar</h2>
        <div id="calendar-widget"></div>
    </section>

</main>

<script src="script.js"></script>

</body>
</html>
